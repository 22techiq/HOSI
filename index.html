function toast(msg){

  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;

  document.body.appendChild(t);

  setTimeout(()=>{
    t.remove();
  },3000);
}

async function post(data){

  try{

    const res = await fetch(API,{
      method:"POST",
      body:JSON.stringify(data)
    });

    return await res.json();

  }catch(err){

    console.error(err);

    toast("Network error");

    return {};
  }
}

/* =========================
   LOGIN
========================= */

async function login(){

  const btn = event.target;

  btn.innerHTML = `<div class="loader"></div>`;

  const res = await post({
    action:"login",
    email:email.value,
    password:password.value
  });

  if(res.success){

    TOKEN = res.token;
    ROLE = res.role;

    localStorage.setItem("token",TOKEN);
    localStorage.setItem("role",ROLE);

    dashboard();

  }else{

    toast("Invalid login");

    btn.innerHTML = "Login";
  }
}

// =========================
// RESET PASSWORD PAGE
// =========================

function resetPasswordPage(token){

  root.innerHTML = `

  <div class="login-page">

    <div class="login-card">

      <h1>🔐 Reset Password</h1>

      <p>Create your new password</p>

      <input id="newPassword"
      type="password"
      placeholder="New password">

      <button class="primary-btn"
      onclick="submitReset('${token}')">
        Reset Password
      </button>

    </div>

  </div>
  `;
}



// =========================
// SUBMIT RESET
// =========================

async function submitReset(token){

  const password = newPassword.value;

  if(password.length < 4){

    toast("Password too short");

    return;
  }

  const res = await post({
    action:"resetPassword",
    token:token,
    password:password
  });

  if(res.success){

    toast("Password reset successful");

    setTimeout(()=>{

      window.location.href =
        window.location.origin +
        window.location.pathname;

    },1500);

  }else{

    toast(res.error || "Reset failed");
  }
}



// =========================
// INVITE ACCEPT PAGE
// =========================

async function inviteAcceptPage(token){

  // Validate token first
  const res = await post({
    action:"validateInvite",
    token:token
  });

  // Invalid invite
  if(!res.valid){

    root.innerHTML = `

    <div class="login-page">

      <div class="login-card">

        <h1>❌ Invalid Invite</h1>

        <p>This invite link is invalid or expired.</p>

      </div>

    </div>
    `;

    return;
  }

  // Valid invite
  root.innerHTML = `

  <div class="login-page">

    <div class="login-card">

      <h1>🏥 Accept Invite</h1>

      <p>Create your account password</p>

      <input id="inviteName"
      placeholder="Full Name">

      <input id="invitePassword"
      type="password"
      placeholder="Create Password">

      <button class="primary-btn"
      onclick="completeInvite('${token}')">
        Create Account
      </button>

    </div>

  </div>
  `;
}




// =========================
// COMPLETE INVITE
// =========================

async function completeInvite(token){

  const name = inviteName.value;
  const password = invitePassword.value;

  if(name.length < 3){

    toast("Enter full name");

    return;
  }

  if(password.length < 4){

    toast("Password too short");

    return;
  }

  const res = await post({
    action:"completeInvite",
    token:token,
    name:name,
    password:password
  });

  if(res.success){

    toast("Account created successfully");

    setTimeout(()=>{

      window.location.href =
        window.location.origin +
        window.location.pathname;

    },1500);

  }else{

    toast(res.error || "Invite failed");
  }
}

<script>
/* ============================================
AUTO LOGOUT + LIVE COUNTDOWN
============================================ */

// Inactivity limit (minutes)
const INACTIVITY_MINUTES = 10;

// Warning before logout (seconds)
const WARNING_SECONDS = 60;

// Time calculations
const TIMEOUT =
  INACTIVITY_MINUTES * 60 * 1000;

const WARNING_TIME =
  TIMEOUT - (WARNING_SECONDS * 1000);

let logoutTimer;
let warningTimer;
let countdownInterval;

/* ============================================
SHOW WARNING MODAL
============================================ */

function showLogoutWarning(){

  // Prevent duplicate modal
  if(document.getElementById("sessionWarning")) return;

  let secondsLeft = WARNING_SECONDS;

  const modal = document.createElement("div");

  modal.id = "sessionWarning";

  modal.innerHTML = `
    <div style="
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:99999;
      backdrop-filter:blur(4px);
    ">

      <div style="
        background:#fff;
        width:340px;
        border-radius:20px;
        padding:24px;
        font-family:Arial,sans-serif;
        text-align:center;
        box-shadow:0 15px 40px rgba(0,0,0,.25);
        animation:popIn .25s ease;
      ">

        <h2 style="
          margin-top:0;
          margin-bottom:10px;
          color:#111827;
        ">
          Session Expiring
        </h2>

        <p style="
          color:#4b5563;
          line-height:1.5;
          margin-bottom:20px;
        ">
          You will be logged out due to inactivity.
        </p>

        <!-- LIVE COUNTDOWN -->
        <div style="
          width:80px;
          height:80px;
          margin:0 auto 20px;
          border-radius:50%;
          background:#eff6ff;
          display:flex;
          align-items:center;
          justify-content:center;
          border:6px solid #2563eb;
        ">

          <div>
            <div id="countdownNumber"
              style="
                font-size:38px;
                font-weight:800;
                color:#2563eb;
                line-height:1;
              ">
              ${secondsLeft}
            </div>

            <div style="
              font-size:13px;
              color:#6b7280;
              margin-top:6px;
              letter-spacing:.5px;
            ">
              SECONDS
            </div>
          </div>

        </div>

        <button id="stayLoggedInBtn"
          style="
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            width:100%;
            font-size:15px;
            transition:.2s;
          ">

          Stay Logged In

        </button>

      </div>

    </div>
  `;

  document.body.appendChild(modal);

  // Countdown logic
  const countdownEl =
    document.getElementById("countdownNumber");

  countdownInterval = setInterval(()=>{

    secondsLeft--;

    if(countdownEl){

      countdownEl.textContent = secondsLeft;
    }

    // Countdown color warning
    if(secondsLeft <= 10){

      countdownEl.style.color = "#dc2626";
    }

    if(secondsLeft <= 0){

      clearInterval(countdownInterval);
    }

  },1000);

  // Keep logged in
  document
    .getElementById("stayLoggedInBtn")
    .onclick = ()=>{

      clearInterval(countdownInterval);

      modal.remove();

      resetInactivityTimer();

      if(typeof toast === "function"){

        toast("Session extended");
      }
    };
}

/* ============================================
AUTO LOGOUT
============================================ */

function autoLogout(){

  clearInterval(countdownInterval);

  localStorage.clear();

  if(typeof toast === "function"){

    toast(
      "Logged out due to inactivity"
    );
  }

  setTimeout(()=>{

    location.reload();

  },1000);
}

/* ============================================
RESET TIMERS
============================================ */

function resetInactivityTimer(){

  clearTimeout(logoutTimer);
  clearTimeout(warningTimer);

  clearInterval(countdownInterval);

  // Remove warning modal if exists
  const existing =
    document.getElementById("sessionWarning");

  if(existing){

    existing.remove();
  }

  // Warning popup
  warningTimer = setTimeout(()=>{

    showLogoutWarning();

  }, WARNING_TIME);

  // Final logout
  logoutTimer = setTimeout(()=>{

    autoLogout();

  }, TIMEOUT);
}

/* ============================================
DETECT ACTIVITY
============================================ */

[
  "click",
  "mousemove",
  "keydown",
  "scroll",
  "touchstart"
].forEach(event=>{

  document.addEventListener(
    event,
    resetInactivityTimer
  );
});

/* ============================================
START TIMER
============================================ */

resetInactivityTimer();
</script>
